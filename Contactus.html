<head>

    <meta charset="UTF-8">

    <!-- jQuery -->

    <!-- Popper.js -->

    <!-- Bootstrap JS -->

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <!-- Css -->
    <link rel="stylesheet" href="Main.css" />
    <style>
        body {

            background: #000;

            font-family: Arial, sans-serif;
            margin-top: 5%;

        }

        .contact-section {

            padding: 70px 0;

            /* min-height: 100vh; */

            display: flex;

            align-items: center;

        }

        .contact-container {

            background: #111;

            border-radius: 20px;

            padding: 50px;

            box-shadow: 0px 0px 30px rgba(255, 255, 255, 0.1);

        }

        .title {

            font-size: 45px;

            font-weight: bold;

            color: #fff;

            margin-bottom: 10px;

        }

        .subtitle {

            color: #bdbdbd;

            margin-bottom: 40px;

        }

        .contact-card {

            display: flex;

            margin-bottom: 30px;

        }

        .icon-box {

            height: 60px;

            width: 60px;

            background: #ffb400;
            ;

            border-radius: 50%;

            display: flex;

            justify-content: center;

            align-items: center;

            margin-right: 20px;

        }

        .icon-box i {

            font-size: 25px;

            color: #fff;

        }

        .contact-card h5 {

            color: #fff;

        }

        .contact-card p {

            color: #bdbdbd;

            margin: 0;

        }

        .form-control {

            background: #222;

            border: none;

            height: 50px;

            color: #fff;

            border-radius: 10px;

        }

        textarea.form-control {

            height: 140px;

        }

        .form-control::placeholder {

            color: #bdbdbd;

        }

        .form-control:focus {

            background: #222;

            color: #fff;

            box-shadow: none;

            border: 1px solid #ffb400;

        }

        .btn-custom {

            width: 100%;

            height: 50px;

            border-radius: 30px;

            font-size: 18px;

            font-weight: bold;

        }

        .btn-custom:hover {

            transform: translateY(-3px);

            transition: 0.3s;

        }

        @media(max-width:768px) {

            .title {

                font-size: 35px;

            }

            .contact-container {

                padding: 25px;

            }

        }
    </style>

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">

                    <li class="nav-item active"><a class="nav-link" href="./Contactus.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <!-- contact section -->

    <section class="contact-section">

        <div class="container">

            <div class="contact-container">

                <div class="row">

                    <div class="col-md-5">

                        <h1 class="title">Contact Us</h1>

                        <p class="subtitle">

                            We'd love to hear from you. Feel free to reach out anytime.

                        </p>

                        <div class="contact-card">

                            <div class="icon-box">

                                <i class="fas fa-map-marker-alt"></i>

                            </div>

                            <div>

                                <h5>Address</h5>

                                <p>Mahabubabad, Telangana, India</p>

                            </div>

                        </div>

                        <div class="contact-card">

                            <div class="icon-box">

                                <i class="fas fa-phone-alt"></i>

                            </div>

                            <div>

                                <h5>Phone</h5>

                                <p>+91 8341213667</p>

                            </div>

                        </div>

                        <div class="contact-card">

                            <div class="icon-box">

                                <i class="fas fa-envelope"></i>

                            </div>

                            <div>

                                <h5>Email</h5>

                                <!-- <p>koushikgaddam55@gmail.com</p> -->

                            </div>

                        </div>

                    </div>

                    <div class="col-md-7">

                        <form>

                            <div class="form-group">

                                <input type="text" class="form-control" placeholder="Full Name">

                            </div>

                            <div class="form-group">

                                <input type="email" class="form-control" placeholder="Email Address">

                            </div>

                            <div class="form-group">

                                <input type="text" class="form-control" placeholder="Subject">

                            </div>

                            <div class="form-group">

                                <textarea class="form-control" placeholder="Your Message">

</textarea>

                            </div>

                            <button class="btn  btn-custom  ">

                                Send Message

                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </section>
